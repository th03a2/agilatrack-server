services:
  # AgilaTrack PH Backend Server
  - type: web
    name: agilatrack-server
    runtime: node
    plan: free
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: agilatrack-data
      mountPath: /app/data
      sizeGB: 1
